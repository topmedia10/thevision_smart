# nginx reverse proxy for the EC2 HTTP API.
# Phase 1 (HTTP): serves the ACME challenge + proxies the API.
# Phase 2 (HTTPS): `certbot --nginx -d api.thevision.co.il` rewrites this to add
# the 443 server block and a 80->443 redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name api.thevision.co.il;

    # Let's Encrypt HTTP-01 challenge webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
