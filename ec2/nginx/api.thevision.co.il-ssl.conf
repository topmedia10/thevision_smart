# HTTPS reverse proxy using a Cloudflare Origin Certificate.
# Install the cert/key to:
#   /etc/ssl/cloudflare/origin.pem   (the "Origin Certificate" block)
#   /etc/ssl/cloudflare/origin.key   (the "Private Key" block, mode 600)
# Then replace the plain-HTTP conf with this one and `nginx -t && systemctl reload nginx`.
# Use Cloudflare SSL/TLS mode "Full (strict)".

server {
    listen 80;
    listen [::]:80;
    server_name api.thevision.co.il;
    # Cloudflare connects to the origin over 443; redirect any direct HTTP.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.thevision.co.il;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
